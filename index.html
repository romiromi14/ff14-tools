<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>FF14ツール ランチャー</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: #fff;
        margin: 0;
        padding: 40px 20px;
        min-height: 100vh;
      }
      h1 {
        text-align: center;
        font-size: 2em;
        margin-bottom: 8px;
        letter-spacing: 0.05em;
      }
      .subtitle {
        text-align: center;
        opacity: 0.8;
        margin-bottom: 30px;
        font-size: 0.95em;
      }
      .toolbar {
        text-align: center;
        margin-bottom: 20px;
      }
      .toolbar button {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #fff;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85em;
        margin: 0 4px;
      }
      .toolbar button:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 20px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .card {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        padding: 22px;
        transition:
          transform 0.2s,
          background 0.2s,
          box-shadow 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        position: relative;
        user-select: none;
        min-height: 200px;
      }
      .card:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.2);
      }
      .card.dragging {
        opacity: 0.4;
        transform: scale(0.95);
      }
      .card.drag-over {
        box-shadow: 0 0 0 3px #ffd700;
      }
      .card-icon {
        font-size: 2.4em;
        margin-bottom: 10px;
        font-family:
          "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
        line-height: 1;
        height: 1.2em;
      }
      .card-title {
        font-size: 1.15em;
        font-weight: bold;
        margin-bottom: 6px;
      }
      .card-desc {
        font-size: 0.85em;
        opacity: 0.85;
        margin-bottom: 10px;
        line-height: 1.5;
        flex-grow: 1;
      }
      .card-version {
        display: inline-block;
        background: rgba(0, 0, 0, 0.3);
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 0.8em;
        font-family: monospace;
      }
      .drag-handle {
        position: absolute;
        top: 8px;
        right: 12px;
        font-size: 1.2em;
        opacity: 0.4;
        cursor: grab;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .missing {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .missing:hover {
        transform: none;
        background: rgba(255, 255, 255, 0.12);
      }
      footer {
        text-align: center;
        margin-top: 40px;
        opacity: 0.6;
        font-size: 0.8em;
      }
    </style>
  </head>
  <body>
    <h1>⚔️ FF14ツール ランチャー</h1>
    <p class="subtitle">
      カード右上の
      <span style="opacity: 0.6">⋮⋮</span>
      をドラッグして並び替えできます（順序は自動保存）
    </p>

    <div class="toolbar">
      <button onclick="resetOrder()">並び順をリセット</button>
    </div>

    <div class="grid" id="grid"></div>

    <details class="dev-section">
      <summary>🚧 開発中のツール</summary>
      <div class="dev-list" id="dev-list"></div>
    </details>

    <footer>新ツール追加はHTML内 <code>TOOLS</code> 配列を編集</footer>

    <script>
      // ========================================
      // ツール一覧
      // basename: 実ファイル名（.html を除いた部分）
      // ========================================
      const TOOLS = [
        {
          basename: "il_manager",
          title: "装備IL管理",
          desc: "防具とアクセのIL管理ツール",
          icon: "🛡️",
        },
        {
          basename: "Cruel_Coil",
          title: "細胞中期カンペ",
          desc: "ヘビー級零式4層前半のやつ",
          icon: "🌀",
        },
        {
          basename: "want_to_list",
          title: "やりたいこと置き場",
          desc: "ゆるいtodoリストツール",
          icon: "🐿️",
        },

        // 今後ツール増えたらここに追加
      ];

      const DEV_TOOLS = [
        {
          filename: "materia_sim",
          title: "禁断シミュ",
        },
        // 開発中のものがあればここに追加
      ];

      const ORDER_KEY = "launcher_tool_order";

      // 保存された並び順を適用
      function getOrderedTools() {
        const saved = localStorage.getItem(ORDER_KEY);
        if (!saved) return [...TOOLS];
        try {
          const order = JSON.parse(saved);
          const map = new Map(TOOLS.map((t) => [t.basename, t]));
          const ordered = [];
          for (const basename of order) {
            if (map.has(basename)) {
              ordered.push(map.get(basename));
              map.delete(basename);
            }
          }
          // 新規追加されたツールは末尾に
          for (const t of map.values()) ordered.push(t);
          return ordered;
        } catch {
          return [...TOOLS];
        }
      }

      function saveOrder() {
        const cards = document.querySelectorAll("#grid .card");
        const order = Array.from(cards).map((c) => c.dataset.basename);
        localStorage.setItem(ORDER_KEY, JSON.stringify(order));
      }

      function resetOrder() {
        localStorage.removeItem(ORDER_KEY);
        location.reload();
      }

      async function fileExists(url) {
        try {
          const res = await fetch(url, { method: "HEAD" });
          return res.ok;
        } catch {
          try {
            const res = await fetch(url);
            return res.ok;
          } catch {
            return false;
          }
        }
      }

      // ========================================
      // ドラッグ＆ドロップ機能
      // ========================================
      let draggedCard = null;

      function enableDragAndDrop(card) {
        card.draggable = true;
        let enterCounter = 0;

        card.addEventListener("dragstart", (e) => {
          draggedCard = card;
          card.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          document.querySelectorAll(".card").forEach((c) => {
            c.classList.remove("drag-over");
          });
          draggedCard = null;
          saveOrder();
        });

        card.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
        });

        card.addEventListener("dragenter", (e) => {
          if (card === draggedCard) return;
          enterCounter++;
          card.classList.add("drag-over");
        });

        card.addEventListener("dragleave", (e) => {
          if (card === draggedCard) return;
          enterCounter--;
          if (enterCounter <= 0) {
            enterCounter = 0;
            card.classList.remove("drag-over");
          }
        });

        card.addEventListener("drop", (e) => {
          e.preventDefault();
          e.stopPropagation();
          enterCounter = 0;
          if (draggedCard && draggedCard !== card) {
            const grid = document.getElementById("grid");
            const cards = Array.from(grid.children);
            const draggedIdx = cards.indexOf(draggedCard);
            const targetIdx = cards.indexOf(card);
            if (draggedIdx < targetIdx) {
              grid.insertBefore(draggedCard, card.nextSibling);
            } else {
              grid.insertBefore(draggedCard, card);
            }
          }
          card.classList.remove("drag-over");
        });

        card.addEventListener("click", (e) => {
          if (card.classList.contains("dragging")) e.preventDefault();
        });
      }

      async function render() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        const tools = getOrderedTools();

        // 全ツールの存在確認を並列実行
        const existsResults = await Promise.all(
          tools.map((tool) => fileExists(`${tool.basename}.html`)),
        );

        tools.forEach((tool, i) => {
          const exists = existsResults[i];
          const url = `${tool.basename}.html`;
          const versionLabel = exists ? "OPEN" : "見つかりません";

          const card = document.createElement(exists ? "a" : "div");
          card.className = "card" + (exists ? "" : " missing");
          card.dataset.basename = tool.basename;
          if (exists) card.href = url;
          card.innerHTML = `
            <span class="drag-handle" title="ドラッグで並び替え">⋮⋮</span>
            <div class="card-icon">${tool.icon}</div>
            <div class="card-title">${tool.title}</div>
            <div class="card-desc">${tool.desc}</div>
            <span class="card-version">${versionLabel}</span>
          `;
          enableDragAndDrop(card);
          grid.appendChild(card);
        });
      }

      render();
    </script>
  </body>
</html>
